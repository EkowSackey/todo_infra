AWSTemplateFormatVersion: '2010-09-09'
Description: Todo App — RDS PostgreSQL 16 + Secrets Manager

Parameters:
  EnvironmentName:
    Type: String
  AppName:
    Type: String
  RDSSubnet1Id:
    Type: AWS::EC2::Subnet::Id
  RDSSubnet2Id:
    Type: AWS::EC2::Subnet::Id
  RdsSgId:
    Type: AWS::EC2::SecurityGroup::Id

Resources:

  # ── DB Subnet Group ────────────────────────────────────────────────────────

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: !Sub ${EnvironmentName}-${AppName} RDS subnets
      SubnetIds:
        - !Ref RDSSubnet1Id
        - !Ref RDSSubnet2Id
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-${AppName}-db-subnet-group

  # ── DB Parameter Group ─────────────────────────────────────────────────────

  DBParameterGroup:
    Type: AWS::RDS::DBParameterGroup
    Properties:
      Description: !Sub ${EnvironmentName}-${AppName} PostgreSQL 16 parameters
      Family: postgres16
      Parameters:
        max_connections: '100'
        log_connections: '1'
        log_min_duration_statement: '1000'

  # ── Secrets Manager Secret ─────────────────────────────────────────────────
  # Auto-generates a strong password for the postgres user.

  DBSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub /todo/${EnvironmentName}/db-secret
      Description: RDS credentials for the todo app
      GenerateSecretString:
        SecretStringTemplate: '{"username": "postgres"}'
        GenerateStringKey: password
        PasswordLength: 32
        ExcludeCharacters: '"@/\'
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Project
          Value: !Ref AppName

  # ── RDS Instance ───────────────────────────────────────────────────────────

  DBInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: !Sub ${EnvironmentName}-${AppName}-db
      DBInstanceClass: db.t3.micro
      Engine: postgres
      EngineVersion: '16'
      DBName: tododb
      MasterUsername: !Sub '{{resolve:secretsmanager:${DBSecret}:SecretString:username}}'
      MasterUserPassword: !Sub '{{resolve:secretsmanager:${DBSecret}:SecretString:password}}'
      DBSubnetGroupName: !Ref DBSubnetGroup
      DBParameterGroupName: !Ref DBParameterGroup
      VPCSecurityGroups:
        - !Ref RdsSgId
      MultiAZ: false
      StorageType: gp3
      AllocatedStorage: '20'
      StorageEncrypted: true
      BackupRetentionPeriod: 7
      DeletionProtection: false
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Project
          Value: !Ref AppName

  # ── SSM Parameters ─────────────────────────────────────────────────────────

  SSMDBSecretArn:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /${AppName}/${EnvironmentName}/db-secret-arn
      Type: String
      Value: !Ref DBSecret

  SSMDBName:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /${AppName}/${EnvironmentName}/db-name
      Type: String
      Value: tododb

Outputs:
  DBEndpoint:
    Value: !GetAtt DBInstance.Endpoint.Address
  DBInstanceIdentifier:
    Value: !Ref DBInstance
  DBName:
    Value: tododb
  DBSecretArn:
    Value: !Ref DBSecret
